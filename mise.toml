[tools]
rust = "1.96.1"
# jj-lib reads the on-disk .jj store directly, so jjfx is version-coupled to the
# jj binary's store format (ADR 0007). Pin jj to the version jj-lib targets and
# upgrade them in lockstep. Spike 02 confirmed jj 0.43.0 <-> jj-lib 0.43.0.
jj = "0.43.0"
# Cross-compilation toolchain for `mise run release`. zig is the C cross-linker
# cargo-zigbuild drives; together they build Linux (musl/gnu) and both macOS
# arches from this host without Docker (cross/Docker cannot target apple-darwin).
zig = "0.16.0"
"cargo:cargo-zigbuild" = "0.23.0"

[tasks.run]
description = "Run the app"
run = "cargo run"

[tasks.build]
description = "Build the workspace"
run = "cargo build"

[tasks.test]
description = "Run tests"
run = "cargo test"

[tasks.fmt]
description = "Format all code"
run = "cargo fmt --all"

[tasks.lint]
description = "Clippy across all targets, warnings as errors"
run = "cargo clippy --all-targets -- -D warnings"

[tasks.check]
description = "fmt + lint + build + test (the pre-land gate)"
depends = ["fmt", "lint", "build", "test"]
