[package]
name = "jjfx"
version = "0.1.0"
edition = "2024"
license = "GPL-3.0-or-later"

[dependencies]
anyhow = "1"
ratatui = "0.29"
notify = "8"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync"] }

[lints.rust]
unsafe_code = "forbid"
unused = { level = "warn", priority = -1 }

[lints.clippy]
all = { level = "warn", priority = -1 }
