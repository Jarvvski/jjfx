[package]
name = "jjfx"
version = "0.8.1"
edition = "2024"
license = "GPL-3.0-or-later"

[dependencies]
anyhow = "1"
ratatui = "0.29"
notify = "8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time"] }

[lints.rust]
unsafe_code = "forbid"
unused = { level = "warn", priority = -1 }

[lints.clippy]
all = { level = "warn", priority = -1 }
